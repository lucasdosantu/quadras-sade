<!DOCTYPE html>
<!-- Licensed under CC BY-NC 4.0: https://creativecommons.org/licenses/by-nc/4.0/ -->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SADE - Localizador de Quadras</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/estilo-mapa.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="header">
        <div class="search-container">
            <input type="text" id="mainSearch" class="search-box" placeholder="Digite Quadra, CEP ou Bairro..." list="listaSugestoes">
            <datalist id="listaSugestoes"></datalist>
        </div>
    </div>

    <div id="map">
        <div class="controls-right">
            <button class="btn-float btn-sat" onclick="event.stopPropagation(); toggleSatelite()">🛰️</button>
            <button class="btn-float btn-suggest" id="btnSuggest" onclick="event.stopPropagation(); toggleSuggestMode()">➕</button>
            <button class="btn-float" onclick="event.stopPropagation(); minhaLocalizacao()">📍</button>
        </div>
    </div>

    <div id="footer">&copy; <span id="anoAtual"></span> SADE - Localizador de Quadras | <span id="totalQuadras">0</span> mapeadas.</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="dados.js"></script>

    <script src="js/config.js"></script>
    <script src="js/gps.js"></script>
    <script src="js/busca.js"></script>
    <script src="js/acoes.js"></script>

    <script>
        window.onload = () => {
            if (typeof baseDeDados !== 'undefined') {
                document.getElementById('totalQuadras').innerText = baseDeDados.length;
            }
            document.getElementById('anoAtual').innerText = new Date().getFullYear();
            minhaLocalizacao();
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
              .then(() => console.log("SADE: Offline pronto."))
              .catch(err => console.error("SADE: Erro no SW", err));
        }
    </script>
</body>
</html>
